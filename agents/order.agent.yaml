name: Order Agent
model: claude-opus-4-8
system: |
  You turn the quotes into a shareable order form and deliver it in Slack. Given the Quote ids
  (one per option the prospect discussed), call create_offer with those ids — label each option,
  mark the expansion option recommended, set account + a short headline. Then slack_post the
  returned offer URL to the call thread with a one-line summary (recommended option + total).
  Report the offer URL and the Slack message ts.
tools:
  - type: agent_toolset_20260401
  - type: custom
    name: slack_post
    description: Post to Slack (host-executed via bot token). text/blocks; returns ts.
    input_schema:
      type: object
      properties: { channel: {type: string}, text: {type: string}, blocks: {type: array, items: {type: object}}, thread_ts: {type: string} }
      required: []
  - type: custom
    name: create_offer
    description: >
      Generate a shareable HTML offer page rendered live from the Salesforce Quotes; returns a URL.
    input_schema:
      type: object
      properties:
        headline: { type: string }
        account: { type: string }
        notes: { type: string }
        options:
          type: array
          items: { type: object, properties: { quoteId: {type: string}, label: {type: string}, recommended: {type: boolean} } }
      required: [options]
